<!DOCTYPE html>
<html>
<head>

<title>WriteSphere</title>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fa;
font-family:Arial;
}

.navbar-brand{
font-size:26px;
font-weight:bold;
}

.footer{
background:#212529;
color:white;
padding:20px;
margin-top:40px;
text-align:center;
}

.post-card{
transition:0.3s;
}

.post-card:hover{
transform:scale(1.03);
}

</style>

</head>

<body>


<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand" href="/">WriteSphere</a>

<div>

<a href="/" class="btn btn-outline-light me-2">Home</a>

<a href="/add-post/" class="btn btn-success me-2">Add Blog</a>

<a href="/login/" class="btn btn-primary me-2">Login</a>

<a href="/register/" class="btn btn-warning me-2">Register</a>

<a href="/logout/" class="btn btn-danger">Logout</a>

</div>

</div>

</nav>


<!-- CONTENT -->

<div class="container mt-5">

{% block content %}

{% endblock %}

</div>


<!-- FOOTER -->

<div class="footer">

<h5>WriteSphere Blog Platform</h5>

<p>Built with Django & Bootstrap</p>

</div>

</body>
</html>
