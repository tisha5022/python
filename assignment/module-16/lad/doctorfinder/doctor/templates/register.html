<!DOCTYPE html>
<html>
<head>
<script>
function validateForm() {
    let email = document.forms["form"]["email"].value;

    if (!email.includes("@")) {
        alert("Invalid Email");
        return false;
    }
}
</script>
</head>

<body>
<form name="form" onsubmit="return validateForm()">
    Email: <input type="text" name="email">
    <input type="submit">
</form>
</body>
</html>
