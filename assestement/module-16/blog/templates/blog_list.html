{% extends 'base.html' %}

{% block content %}

<h2>My Posts</h2>

<div class="row">

{% for post in posts %}

<div class="col-md-4 mb-4">

<div class="card shadow">

{% if post.cover_image %}
<img src="{{post.cover_image.url}}" class="card-img-top" style="height:200px;object-fit:cover;">
{% endif %}

<div class="card-body">

<h5>{{post.title}}</h5>

<p>{{post.content|truncatewords:20}}</p>

<a href="/post/{{post.id}}/" class="btn btn-primary btn-sm">View</a>

<a href="/edit-post/{{post.id}}/" class="btn btn-warning btn-sm">Edit</a>

<a href="/delete-post/{{post.id}}/" class="btn btn-danger btn-sm"
onclick="return confirm('Are you sure you want to delete this post?')">
Delete
</a>

</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
